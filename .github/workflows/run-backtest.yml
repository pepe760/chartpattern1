name: Quant Master S&P 500 Backtest

# 設定可以手動點擊按鈕來觸發執行
on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest # 使用免費的 Linux 伺服器
    timeout-minutes: 360 # 允許最多執行 6 小時

    steps:
    - name: 下載程式碼
      uses: actions/checkout@v4 # 已更新至 v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5 # 已更新至 v5
      with:
        python-version: '3.10'

    - name: 安裝所需套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy scipy matplotlib seaborn tqdm lxml html5lib beautifulsoup4 requests

    - name: 執行回測腳本
      run: python quant_master.py

    - name: 保存打包好的 ZIP 檔案
      uses: actions/upload-artifact@v4 # 已更新至 v4 (解決報錯的關鍵)
      with:
        name: Quant-Master-Results
        path: quant_master_results_sp500.zip
        retention-days: 7
